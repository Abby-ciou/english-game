<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松果村英文大冒險</title>
<style>
:root{--card:#fffdf8;--green:#4b7f52;--deep:#284b35;--gold:#f2b64b;--line:#ddcba5;}
*{box-sizing:border-box} body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(#fff7df,#edf8e9);color:#273b2b}
header{padding:22px 14px;text-align:center;background:linear-gradient(135deg,#dff0d8,#fff0c9);border-bottom:4px solid #a9c995}
h1{margin:0;color:var(--deep);font-size:32px}.wrap{max-width:1080px;margin:0 auto;padding:16px}
.panel{background:rgba(255,253,248,.96);border:2px solid var(--line);border-radius:24px;padding:18px;margin:14px 0;box-shadow:0 6px 0 #eadfc6}
.topbar{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center}.badge{display:inline-block;background:#fff0cf;border:2px solid #edc26e;border-radius:999px;padding:8px 13px;margin:3px;font-weight:800}
button{border:0;border-radius:16px;padding:12px 16px;background:var(--green);color:white;font-weight:800;font-size:16px;cursor:pointer}button:hover{filter:brightness(1.05)}button.light{background:white;color:var(--deep);border:2px solid var(--green)}button.secondary{background:#8c7a5b}button.danger{background:#b65b50}
.map{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}.chapter{background:#fff;border:2px solid #b9d0a9;border-radius:22px;padding:18px;min-height:150px;box-shadow:0 4px 0 #dfe9d7;text-align:center}.chapter.locked{filter:grayscale(1);opacity:.55}.chapter .icon{font-size:42px}.chapter h3{margin:8px 0 5px;color:var(--deep)}
.stars{font-size:22px;letter-spacing:2px;color:#d89a19}.path{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px}.quest{background:#fff;border:2px solid #b9d0a9;border-radius:18px;padding:14px;text-align:center;min-height:118px}.quest.locked{opacity:.45;filter:grayscale(1)}.quest .big{font-size:34px}
.word{font-size:52px;font-weight:900;color:var(--deep);word-break:break-word}.zh{font-size:30px;font-weight:800;color:#7b5c24}.sent{font-size:25px;font-weight:700}.card{min-height:360px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px}
.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;width:100%;margin-top:10px}input{width:100%;max-width:440px;border:2px solid var(--line);border-radius:16px;padding:13px;font-size:20px;text-align:center}
.dropzone,.tiles{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:66px;padding:14px;border:2px dashed #aac09f;border-radius:18px;background:#f7fbf5;width:100%}.tile{background:#fff;border:2px solid #9dc08b;border-radius:14px;padding:12px 16px;font-size:22px;font-weight:900;cursor:pointer;user-select:none}.tile.used{opacity:.22}.feedback{text-align:center;font-size:24px;font-weight:900;min-height:36px}.ok{color:#2e7d32}.no{color:#b23b2e}.small{font-size:14px;color:#64745f}.progress{height:16px;background:#eee0c5;border-radius:999px;overflow:hidden;border:1px solid #d0bd95}.progress span{display:block;height:100%;background:linear-gradient(90deg,#7dbb68,#f2b64b);width:0%}table{width:100%;border-collapse:collapse;background:white;font-size:14px}td,th{border:1px solid #ddd;padding:7px;text-align:left} th{background:#edf5e9}.teacher{max-height:420px;overflow:auto}
@media(max-width:650px){h1{font-size:25px}.word{font-size:39px}.zh{font-size:25px}.sent{font-size:20px}}
</style>
</head>
<body>
<header><h1>🌲 松果村英文大冒險</h1><div>每章 10 個單字｜小關卡分開計分｜三星闖關｜適合嵌入 Google 協作平台</div></header>
<div class="wrap">
<div class="panel topbar"><div><span class="badge">🪙 金幣 <span id="coins">0</span></span><span class="badge">⭐ 總星星 <span id="stars">0</span></span><span class="badge">🏗️ 建築 <span id="buildings">0</span>/8</span></div><div><button class="light" onclick="goMap()">回地圖</button><button class="secondary" onclick="teacherMode()">老師總表</button><button class="danger" onclick="resetAll()">清除存檔</button></div></div>
<div id="app"></div><div id="feedback" class="feedback"></div></div>
<script>
const CHAPTERS = [{"id": 1, "title": "早餐村", "icon": "🥐", "building": "早餐店", "words": [{"word": "breakfast", "zh": "早餐", "sentence": "I eat breakfast.", "sentence_zh": "我吃早餐。"}, {"word": "lunch", "zh": "午餐", "sentence": "I eat lunch at school.", "sentence_zh": "我在學校吃午餐。"}, {"word": "dinner", "zh": "晚餐", "sentence": "We eat dinner together.", "sentence_zh": "我們一起吃晚餐。"}, {"word": "meal", "zh": "餐", "sentence": "This meal is yummy.", "sentence_zh": "這一餐很好吃。"}, {"word": "eat", "zh": "吃", "sentence": "I eat rice.", "sentence_zh": "我吃飯。"}, {"word": "food", "zh": "食物", "sentence": "This food is yummy.", "sentence_zh": "這個食物很好吃。"}, {"word": "fruit", "zh": "水果", "sentence": "Fruit is good for me.", "sentence_zh": "水果對我有益。"}, {"word": "water", "zh": "水", "sentence": "I drink water.", "sentence_zh": "我喝水。"}, {"word": "juice", "zh": "果汁", "sentence": "I drink juice.", "sentence_zh": "我喝果汁。"}, {"word": "milk", "zh": "牛奶", "sentence": "I drink milk.", "sentence_zh": "我喝牛奶。"}]}, {"id": 2, "title": "水果村", "icon": "🍎", "building": "水果店", "words": [{"word": "apple", "zh": "蘋果", "sentence": "I eat an apple.", "sentence_zh": "我吃一顆蘋果。"}, {"word": "banana", "zh": "香蕉", "sentence": "I like bananas.", "sentence_zh": "我喜歡香蕉。"}, {"word": "orange", "zh": "橘子", "sentence": "I eat an orange.", "sentence_zh": "我吃一顆橘子。"}, {"word": "grape", "zh": "葡萄", "sentence": "I like grapes.", "sentence_zh": "我喜歡葡萄。"}, {"word": "peach", "zh": "桃子", "sentence": "I like peaches.", "sentence_zh": "我喜歡桃子。"}, {"word": "kiwi", "zh": "奇異果", "sentence": "The kiwi is sweet.", "sentence_zh": "奇異果是甜的。"}, {"word": "lemon", "zh": "檸檬", "sentence": "The lemon is sour.", "sentence_zh": "檸檬是酸的。"}, {"word": "strawberry", "zh": "草莓", "sentence": "I eat a strawberry.", "sentence_zh": "我吃一顆草莓。"}, {"word": "watermelon", "zh": "西瓜", "sentence": "I like watermelon.", "sentence_zh": "我喜歡西瓜。"}, {"word": "pumpkin", "zh": "南瓜", "sentence": "The pumpkin is big.", "sentence_zh": "南瓜很大。"}]}, {"id": 3, "title": "肉肉王國", "icon": "🍗", "building": "肉舖", "words": [{"word": "chicken", "zh": "雞肉", "sentence": "I eat chicken.", "sentence_zh": "我吃雞肉。"}, {"word": "duck", "zh": "鴨肉", "sentence": "I eat duck.", "sentence_zh": "我吃鴨肉。"}, {"word": "beef", "zh": "牛肉", "sentence": "I eat beef.", "sentence_zh": "我吃牛肉。"}, {"word": "fish", "zh": "魚肉", "sentence": "I eat fish.", "sentence_zh": "我吃魚肉。"}, {"word": "pork", "zh": "豬肉", "sentence": "I eat pork.", "sentence_zh": "我吃豬肉。"}, {"word": "ham", "zh": "火腿", "sentence": "I eat ham.", "sentence_zh": "我吃火腿。"}, {"word": "egg", "zh": "蛋", "sentence": "I eat an egg.", "sentence_zh": "我吃一顆蛋。"}, {"word": "hot dog", "zh": "熱狗", "sentence": "I eat a hot dog.", "sentence_zh": "我吃一個熱狗。"}, {"word": "hamburger", "zh": "漢堡", "sentence": "I eat a hamburger.", "sentence_zh": "我吃一個漢堡。"}, {"word": "sandwich", "zh": "三明治", "sentence": "I eat a sandwich.", "sentence_zh": "我吃一個三明治。"}]}, {"id": 4, "title": "美食街", "icon": "🍕", "building": "披薩店", "words": [{"word": "bread", "zh": "麵包", "sentence": "I eat bread.", "sentence_zh": "我吃麵包。"}, {"word": "cake", "zh": "蛋糕", "sentence": "I like cake.", "sentence_zh": "我喜歡蛋糕。"}, {"word": "candy", "zh": "糖果", "sentence": "I like candy.", "sentence_zh": "我喜歡糖果。"}, {"word": "cookies", "zh": "餅乾", "sentence": "I eat cookies.", "sentence_zh": "我吃餅乾。"}, {"word": "chocolate", "zh": "巧克力", "sentence": "I like chocolate.", "sentence_zh": "我喜歡巧克力。"}, {"word": "pizza", "zh": "披薩", "sentence": "I like pizza.", "sentence_zh": "我喜歡披薩。"}, {"word": "French fries", "zh": "薯條", "sentence": "I like French fries.", "sentence_zh": "我喜歡薯條。"}, {"word": "dumpling", "zh": "水餃", "sentence": "I eat a dumpling.", "sentence_zh": "我吃一顆水餃。"}, {"word": "rice", "zh": "米、飯", "sentence": "I eat rice.", "sentence_zh": "我吃飯。"}, {"word": "noodles", "zh": "麵條", "sentence": "I eat noodles.", "sentence_zh": "我吃麵條。"}]}, {"id": 5, "title": "廚房餐廳", "icon": "🍜", "building": "餐廳", "words": [{"word": "salad", "zh": "沙拉", "sentence": "I eat salad.", "sentence_zh": "我吃沙拉。"}, {"word": "soup", "zh": "湯", "sentence": "I drink soup.", "sentence_zh": "我喝湯。"}, {"word": "pie", "zh": "派", "sentence": "I like pie.", "sentence_zh": "我喜歡派。"}, {"word": "cheese", "zh": "起司", "sentence": "I like cheese.", "sentence_zh": "我喜歡起司。"}, {"word": "yogurt", "zh": "優格", "sentence": "I eat yogurt.", "sentence_zh": "我吃優格。"}, {"word": "cook", "zh": "做飯", "sentence": "I cook dinner.", "sentence_zh": "我做晚餐。"}, {"word": "taste", "zh": "嚐起來", "sentence": "It tastes good.", "sentence_zh": "它嚐起來很好。"}, {"word": "yummy", "zh": "好吃的、美味的", "sentence": "The pizza is yummy.", "sentence_zh": "披薩很好吃。"}, {"word": "hungry", "zh": "餓的", "sentence": "I'm hungry.", "sentence_zh": "我餓了。"}, {"word": "full", "zh": "飽的", "sentence": "I'm full.", "sentence_zh": "我飽了。"}]}, {"id": 6, "title": "飲料島", "icon": "🥤", "building": "飲料店", "words": [{"word": "coffee", "zh": "咖啡", "sentence": "Dad drinks coffee.", "sentence_zh": "爸爸喝咖啡。"}, {"word": "tea", "zh": "茶", "sentence": "I drink tea.", "sentence_zh": "我喝茶。"}, {"word": "coke", "zh": "可樂", "sentence": "I drink coke.", "sentence_zh": "我喝可樂。"}, {"word": "ice", "zh": "冰塊", "sentence": "The ice is cold.", "sentence_zh": "冰塊很冷。"}, {"word": "ice cream", "zh": "冰淇淋", "sentence": "I like ice cream.", "sentence_zh": "我喜歡冰淇淋。"}, {"word": "drink", "zh": "喝", "sentence": "I drink water.", "sentence_zh": "我喝水。"}, {"word": "sweet", "zh": "甜的", "sentence": "The cake is sweet.", "sentence_zh": "蛋糕是甜的。"}, {"word": "thirsty", "zh": "口渴的", "sentence": "I'm thirsty.", "sentence_zh": "我口渴了。"}, {"word": "cup", "zh": "杯子", "sentence": "This is my cup.", "sentence_zh": "這是我的杯子。"}, {"word": "glass", "zh": "玻璃杯", "sentence": "This is a glass.", "sentence_zh": "這是一個玻璃杯。"}]}, {"id": 7, "title": "餐具自然村", "icon": "🍴", "building": "餐具店與公園", "words": [{"word": "fork", "zh": "叉子", "sentence": "I use a fork.", "sentence_zh": "我使用叉子。"}, {"word": "knife", "zh": "刀子", "sentence": "This is a knife.", "sentence_zh": "這是一把刀子。"}, {"word": "spoon", "zh": "湯匙", "sentence": "I use a spoon.", "sentence_zh": "我使用湯匙。"}, {"word": "dish", "zh": "碟子、盤子", "sentence": "The dish is clean.", "sentence_zh": "盤子很乾淨。"}, {"word": "chopsticks", "zh": "筷子", "sentence": "I use chopsticks.", "sentence_zh": "我使用筷子。"}, {"word": "beach", "zh": "海灘", "sentence": "I go to the beach.", "sentence_zh": "我去海灘。"}, {"word": "lake", "zh": "湖", "sentence": "The lake is beautiful.", "sentence_zh": "湖很美。"}, {"word": "river", "zh": "河流", "sentence": "The river is long.", "sentence_zh": "河流很長。"}, {"word": "mountain", "zh": "山", "sentence": "I climb the mountain.", "sentence_zh": "我爬山。"}, {"word": "sea", "zh": "大海", "sentence": "The sea is blue.", "sentence_zh": "大海是藍色的。"}]}, {"id": 8, "title": "健康診所", "icon": "🏥", "building": "診所", "words": [{"word": "cold", "zh": "感冒", "sentence": "I have a cold.", "sentence_zh": "我感冒了。"}, {"word": "fever", "zh": "發燒", "sentence": "I have a fever.", "sentence_zh": "我發燒了。"}, {"word": "headache", "zh": "頭痛", "sentence": "I have a headache.", "sentence_zh": "我頭痛。"}, {"word": "toothache", "zh": "牙痛", "sentence": "I have a toothache.", "sentence_zh": "我牙痛。"}, {"word": "stomachache", "zh": "胃痛", "sentence": "I have a stomachache.", "sentence_zh": "我胃痛。"}, {"word": "sick", "zh": "生病的", "sentence": "I'm sick.", "sentence_zh": "我生病了。"}, {"word": "well", "zh": "好的、健康的", "sentence": "I'm well.", "sentence_zh": "我很好。"}, {"word": "strong", "zh": "強壯的", "sentence": "He is strong.", "sentence_zh": "他很強壯。"}, {"word": "sleepy", "zh": "想睡的", "sentence": "I'm sleepy.", "sentence_zh": "我想睡。"}, {"word": "tired", "zh": "疲累的", "sentence": "I'm tired.", "sentence_zh": "我累了。"}]}];
const QUESTS = [{id:'card',icon:'📖',name:'單字卡',desc:'先認識10個單字'},{id:'listen',icon:'🔊',name:'聽力挑戰',desc:'聽英文選單字'},{id:'spell',icon:'🔤',name:'字母排序',desc:'拖拉排出英文'},{id:'zh2en',icon:'✏️',name:'中翻英',desc:'看中文打英文'},{id:'en2zh',icon:'🇺🇸',name:'英翻中',desc:'看英文打中文'},{id:'sentence',icon:'🧩',name:'句子重組',desc:'拖拉例句'},{id:'boss',icon:'👑',name:'Boss 關',desc:'綜合挑戰'}];
let state = JSON.parse(localStorage.getItem('pineAdventure')||'{}'); if(!state.chapters) state={coins:0,chapters:{}};
let currentChapter=1,currentQuest='card',questions=[],qIndex=0,correct=0,answerTiles=[];
function save(){localStorage.setItem('pineAdventure',JSON.stringify(state));updateTop()}
function chapterState(id){if(!state.chapters[id]) state.chapters[id]={quests:{},complete:false};return state.chapters[id]}
function questScore(cid,qid){let q=chapterState(cid).quests[qid];return q?q.score:null}
function questStars(score){if(score===null||score===undefined)return 0;if(score>=90)return 3;if(score>=80)return 2;if(score>=70)return 1;return 0}
function chapterUnlocked(id){return id===1||chapterState(id-1).complete}
function chapterStars(id){return QUESTS.reduce((a,q)=>a+questStars(questScore(id,q.id)),0)}
function updateTop(){document.getElementById('coins').textContent=state.coins||0;let total=0,b=0;CHAPTERS.forEach(c=>{total+=chapterStars(c.id);if(chapterState(c.id).complete)b++});document.getElementById('stars').textContent=total;document.getElementById('buildings').textContent=b}
function msg(t,ok=true){document.getElementById('feedback').innerHTML='<span class="'+(ok?'ok':'no')+'">'+t+'</span>'}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)} function normalize(s){return (s||'').trim().toLowerCase().replace(/[.,!?]/g,'').replace(/\s+/g,' ')}
function speak(text){if(!('speechSynthesis' in window)){msg('這個瀏覽器不支援語音播放。',false);return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.75;speechSynthesis.speak(u)}
function esc(s){return String(s).replace(/'/g,"\\'")}
function goMap(){document.getElementById('feedback').innerHTML='';let html='<div class="panel"><h2>🗺️ 松果村地圖</h2><p>完成每章所有小關卡，下一章才會解鎖。每小關滿分100分，90分以上可拿三星。</p><div class="map">';CHAPTERS.forEach(c=>{const unlocked=chapterUnlocked(c.id),cs=chapterStars(c.id);html+=`<div class="chapter ${unlocked?'':'locked'}"><div class="icon">${unlocked?c.icon:'🔒'}</div><h3>第${c.id}章 ${c.title}</h3><div class="small">${c.words.length} 個單字｜完成後建造：${c.building}</div><div class="stars">${'★'.repeat(cs)}${'☆'.repeat(21-cs)}</div><p>${chapterState(c.id).complete?'✅ 已完成':'尚未完成'}</p><button ${unlocked?'':'disabled'} onclick="openChapter(${c.id})">${unlocked?'進入挑戰':'尚未解鎖'}</button></div>`});html+='</div></div>';document.getElementById('app').innerHTML=html;updateTop()}
function openChapter(id){currentChapter=id;const c=CHAPTERS[id-1];let html=`<div class="panel"><h2>${c.icon} 第${c.id}章：${c.title}</h2><p>本章單字：${c.words.map(w=>w.word).join('、')}</p><div class="path">`;QUESTS.forEach((q,i)=>{const unlocked=i===0||questStars(questScore(id,QUESTS[i-1].id))>0;const sc=questScore(id,q.id),st=questStars(sc);html+=`<div class="quest ${unlocked?'':'locked'}"><div class="big">${unlocked?q.icon:'🔒'}</div><b>${q.name}</b><div class="small">${q.desc}</div><div class="stars">${'★'.repeat(st)}${'☆'.repeat(3-st)}</div><div class="small">${sc===null?'尚未挑戰':'最高分 '+sc}</div><button ${unlocked?'':'disabled'} onclick="startQuest('${q.id}')">${unlocked?'開始':'鎖定'}</button></div>`});html+='</div><p><button class="light" onclick="goMap()">回地圖</button></p></div>';document.getElementById('app').innerHTML=html;updateTop()}
function startQuest(qid){currentQuest=qid;correct=0;qIndex=0;document.getElementById('feedback').innerHTML='';let c=CHAPTERS[currentChapter-1];questions=qid==='card'?c.words:shuffle(c.words).slice(0,10);renderQuestion()}
function progressHtml(){return `<div class="small">第 ${Math.min(qIndex+1,10)} / 10 題</div><div class="progress"><span style="width:${qIndex*10}%"></span></div>`}
function renderQuestion(){const c=CHAPTERS[currentChapter-1],w=questions[qIndex];if(currentQuest==='card'){renderCard(c,w);return}if(qIndex>=10){finishQuest();return}if(currentQuest==='listen')renderListen(c,w);if(currentQuest==='spell')renderSpell(c,w);if(currentQuest==='zh2en')renderZh2En(c,w);if(currentQuest==='en2zh')renderEn2Zh(c,w);if(currentQuest==='sentence')renderSentence(c,w);if(currentQuest==='boss')renderBoss(c,w)}
function nextQuestion(ok){if(ok){correct++;state.coins=(state.coins||0)+10;msg('答對了！+10 金幣',true)}else msg('再試一次，等等可以重新挑戰！',false);qIndex++;save();setTimeout(renderQuestion,650)}
function renderCard(c,w){if(qIndex>=c.words.length){finishQuest(100);return}document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">單字卡：先讀、再聽、再看例句</div><div class="word">${w.word}</div><div class="zh">${w.zh}</div><div class="sent">${w.sentence}</div><div>${w.sentence_zh}</div><div><button onclick="speak('${esc(w.word)}')">🔊 聽單字</button> <button onclick="speak('${esc(w.sentence)}')">🔊 聽例句</button> <button class="light" onclick="qIndex++;renderQuestion()">我會了，下一張</button></div></div>`}
function renderListen(c,w){const opts=shuffle([w,...shuffle(c.words.filter(x=>x.word!==w.word)).slice(0,3)]);document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">聽英文，選出正確單字</div><button onclick="speak('${esc(w.word)}')">🔊 播放</button><div class="options">${opts.map(o=>`<button class="light" onclick="nextQuestion('${esc(o.word)}'==='${esc(w.word)}')">${o.word}</button>`).join('')}</div></div>`;setTimeout(()=>speak(w.word),300)}
function renderSpell(c,w){answerTiles=[];const letters=shuffle(w.word.replace(/\s/g,'').split(''));document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">看中文，拖拉字母排出英文</div><div class="zh">${w.zh}</div><div class="dropzone" id="answer"></div><div class="tiles">${letters.map((l,i)=>`<span class="tile" id="tile${i}" onclick="useLetter(${i},'${l}')">${l}</span>`).join('')}</div><button onclick="checkSpell()">送出</button></div>`}
function useLetter(i,l){let el=document.getElementById('tile'+i);if(el.classList.contains('used'))return;el.classList.add('used');answerTiles.push(l);document.getElementById('answer').innerHTML=answerTiles.map(x=>`<span class="tile">${x}</span>`).join('')}
function checkSpell(){const w=questions[qIndex];nextQuestion(answerTiles.join('').toLowerCase()===w.word.replace(/\s/g,'').toLowerCase())}
function renderZh2En(c,w){document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">中翻英：打出英文</div><div class="zh">${w.zh}</div><input id="typing" placeholder="請輸入英文" onkeydown="if(event.key==='Enter')checkZh2En()"><div><button onclick="checkZh2En()">送出</button> <button class="light" onclick="speak('${esc(w.word)}')">🔊 聽提示</button></div></div>`;document.getElementById('typing').focus()}
function checkZh2En(){const w=questions[qIndex];nextQuestion(normalize(document.getElementById('typing').value)===normalize(w.word))}
function renderEn2Zh(c,w){document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">英翻中：打出中文</div><div class="word">${w.word}</div><input id="typing" placeholder="請輸入中文" onkeydown="if(event.key==='Enter')checkEn2Zh()"><div><button onclick="checkEn2Zh()">送出</button> <button class="light" onclick="speak('${esc(w.word)}')">🔊 聽單字</button></div></div>`;document.getElementById('typing').focus()}
function checkEn2Zh(){const w=questions[qIndex],user=document.getElementById('typing').value.trim();nextQuestion(user.length>0&&(w.zh.includes(user)||user.includes(w.zh.split('、')[0])))}
function renderSentence(c,w){answerTiles=[];const tiles=shuffle(w.sentence.replace(/[.]/g,'').split(' '));document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">看中文，拖拉重組英文句子</div><div class="zh">${w.sentence_zh}</div><div class="dropzone" id="answer"></div><div class="tiles">${tiles.map((t,i)=>`<span class="tile" id="wtile${i}" onclick="useWord(${i},'${esc(t)}')">${t}</span>`).join('')}</div><button onclick="checkSentence()">送出</button></div>`}
function useWord(i,t){let el=document.getElementById('wtile'+i);if(el.classList.contains('used'))return;el.classList.add('used');answerTiles.push(t);document.getElementById('answer').innerHTML=answerTiles.map(x=>`<span class="tile">${x}</span>`).join('')}
function checkSentence(){const w=questions[qIndex];nextQuestion(normalize(answerTiles.join(' '))===normalize(w.sentence))}
function renderBoss(c,w){const opts=shuffle([w,...shuffle(c.words.filter(x=>x.word!==w.word)).slice(0,3)]);document.getElementById('app').innerHTML=`<div class="panel card">${progressHtml()}<div class="small">Boss：看情境中文，選出可以完成句子的英文單字</div><div class="zh">${w.sentence_zh}</div><div class="sent">${w.sentence.replace(w.word,'＿＿＿')}</div><div class="options">${opts.map(o=>`<button class="light" onclick="nextQuestion('${esc(o.word)}'==='${esc(w.word)}')">${o.word}</button>`).join('')}</div></div>`}
function finishQuest(forceScore=null){const score=forceScore!==null?forceScore:correct*10;const cs=chapterState(currentChapter);const old=cs.quests[currentQuest]?.score??-1;if(score>old)cs.quests[currentQuest]={score:score,stars:questStars(score)};let allDone=QUESTS.every(q=>questStars(questScore(currentChapter,q.id))>0);if(allDone&&!cs.complete){cs.complete=true;state.coins=(state.coins||0)+100;msg('章節完成！建築完成，額外 +100 金幣！',true)}else msg(`本關完成：${score} 分`,score>=70);save();document.getElementById('app').innerHTML=`<div class="panel card"><div style="font-size:58px">🎉</div><h2>本關完成</h2><div class="zh">${score} 分</div><div class="stars">${'★'.repeat(questStars(score))}${'☆'.repeat(3-questStars(score))}</div><p>${score>=70?'成功過關！':'未達70分，可以再挑戰一次。'}</p><div><button onclick="openChapter(${currentChapter})">回章節</button> <button class="light" onclick="startQuest('${currentQuest}')">再玩一次</button> <button class="secondary" onclick="goMap()">回地圖</button></div></div>`}
function teacherMode(){let rows='';CHAPTERS.forEach(c=>{QUESTS.forEach(q=>{let sc=questScore(c.id,q.id);rows+=`<tr><td>${c.title}</td><td>${q.name}</td><td>${sc===null?'未作答':sc}</td><td>${'★'.repeat(questStars(sc))}</td></tr>`})});document.getElementById('app').innerHTML=`<div class="panel teacher"><h2>👩‍🏫 老師檢視總表</h2><p>這一版是「同一台裝置」的本機紀錄。若學生各自在自己的平板玩，會存在各自裝置中。</p><table><tr><th>章節</th><th>小關</th><th>最高分</th><th>星星</th></tr>${rows}</table><p><button class="light" onclick="goMap()">回地圖</button></p></div>`}
function resetAll(){if(confirm('確定要清除這台裝置的闖關紀錄嗎？')){localStorage.removeItem('pineAdventure');state={coins:0,chapters:{}};save();goMap()}}
updateTop();goMap();
</script></body></html>
